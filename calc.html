<!DOCTYPE html>
<html lang="en">
<head>
<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap"
rel="stylesheet"
>
  <meta charset="UTF-8">

  <meta
          name="viewport"
          content="width=device-width, initial-scale=1.0"
  >

  <title>🌸 Calculator 🌸</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      background:#f9e3ff;

      font-family:'Quicksand', sans-serif;
    }

    .calculator{

      width:390px;

      background:#ffeef4;

      padding:22px;

      border-radius:35px;

      box-shadow:
              0 10px 25px rgba(255,182,193,0.25);
    }

    /* ===== DISPLAY ===== */

    .display{

      width:100%;

      height:90px;

      border:none;

      outline:none;

      border-radius:28px;

      background:white;

      margin-bottom:22px;

      padding:20px;

      text-align:right;

      font-size:30px;

      font-weight:bold;

      color:#5f4b5f;

      font-family:'Quicksand', sans-serif;

      box-shadow:
              inset 0 3px 10px rgba(0,0,0,0.05);
    }

    /* ===== GRID ===== */

    .buttons{

      display:grid;

      grid-template-columns:repeat(4,1fr);

      gap:15px;
    }

    /* ===== BUTTON ===== */

    button{

      height:68px;

      border:none;

      border-radius:24px;

      cursor:pointer;

      font-size:23px;

      font-weight:bold;

      color:#5f4b5f;

      font-family:'Quicksand', sans-serif;

      transition:0.15s;

      box-shadow:
              0 5px 10px rgba(0,0,0,0.08);

      display:flex;

      justify-content:center;

      align-items:center;
    }

    button:hover{

      transform:translateY(-2px);
    }

    button:active{

      transform:scale(0.96);
    }

    /* ===== COLORS ===== */

    .pink{

      background:#ffd2e1;
    }

    .purple{

      background:#dab4eb;
    }

    .soft-purple{

      background:#d2b4f0;
    }

    .cream{

      background:#fff0eb;
    }

    .equal{

      background:#ffaac8;

      width:span 2;
    }

    /* ===== LAST ROW ===== */

.sqrt{

  grid-column:span 1;
}

.plusminus{

  grid-column:span 1;
}

.equal{

  background:#ffaac8;

  grid-column:span 2;
}

  </style>

</head>

<body>

<div class="calculator">

  <!-- DISPLAY -->

  <input
          type="text"
          class="display"
          id="display"
          readonly
  >

  <!-- BUTTONS -->

  <div class="buttons">

    <!-- ROW 1 -->

    <button
            class="pink"
            onclick="clearDisplay()"
    >
      C
    </button>

    <button
            class="purple"
            onclick="append('(')"
    >
      (
    </button>

    <button
            class="purple"
            onclick="append(')')"
    >
      )
    </button>

    <button
            class="pink"
            onclick="backspace()"
    >
      ⌫
    </button>

    <!-- ROW 2 -->

    <button
            class="cream"
            onclick="append('7')"
    >
      7
    </button>

    <button
            class="cream"
            onclick="append('8')"
    >
      8
    </button>

    <button
            class="cream"
            onclick="append('9')"
    >
      9
    </button>

    <button
            class="purple"
            onclick="appendDivide()"
    >
      ÷
    </button>

    <!-- ROW 3 -->

    <button
            class="cream"
            onclick="append('4')"
    >
      4
    </button>

    <button
            class="cream"
            onclick="append('5')"
    >
      5
    </button>

    <button
            class="cream"
            onclick="append('6')"
    >
      6
    </button>

    <button
            class="purple"
            onclick="appendMultiply()"
    >
      ×
    </button>

    <!-- ROW 4 -->

    <button
            class="cream"
            onclick="append('1')"
    >
      1
    </button>

    <button
            class="cream"
            onclick="append('2')"
    >
      2
    </button>

    <button
            class="cream"
            onclick="append('3')"
    >
      3
    </button>

    <button
            class="purple"
            onclick="append('-')"
    >
      −
    </button>

    <!-- ROW 5 -->

    <button
            class="cream"
            onclick="append('0')"
    >
      0
    </button>

    <button
            class="cream"
            onclick="append('.')"
    >
      .
    </button>

    <button
            class="purple"
            onclick="percent()"
    >
      %
    </button>

    <button
            class="purple"
            onclick="append('+')"
    >
      +
    </button>

    <!-- ROW 6 -->

<button
        class="soft-purple sqrt"
        onclick="sqrt()"
>
  √
</button>

<button
        class="soft-purple plusminus"
        onclick="plusMinus()"
>
  ±
</button>

<button
        class="equal"
        onclick="calculate()"
>
  =
</button>

  </div>

</div>

<script>

  const display =
          document.getElementById("display");

  // ===== INPUT =====

  function append(value){

    display.value += value;
  }

  // ===== MULTIPLY =====

  function appendMultiply(){

    display.value += "×";
  }

  // ===== DIVIDE =====

  function appendDivide(){

    display.value += "÷";
  }

  // ===== CLEAR =====

  function clearDisplay(){

    display.value = "";
  }

  // ===== DELETE =====

  function backspace(){

    display.value =
            display.value.slice(0,-1);
  }

  // ===== PLUS MINUS =====

  function plusMinus(){

    if(display.value){

      display.value =
              parseFloat(display.value) * -1;
    }
  }

  // ===== SQRT =====

  function sqrt(){

    if(display.value){

      display.value =
              Math.sqrt(
                      parseFloat(display.value)
              );
    }
  }

  // ===== PERCENT =====

  function percent(){

    if(display.value){

      display.value =
              parseFloat(display.value) / 100;
    }
  }

  // ===== CALCULATE =====

  function calculate(){

    try{

      let expression =
              display.value
                      .replace(/×/g, '*')
                      .replace(/÷/g, '/');

      display.value =
              eval(expression);

    }catch{

      display.value = "Error";
    }
  }

</script>

</body>
</html>
